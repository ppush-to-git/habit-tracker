<html>
    <body>
        <h1>New User Signup:</h1>
        <form method="POST">
            <h3>Enter Username:</h3>
            <input type="text" name="username">
            <h3>Enter Password:</h3>
            <input type="text" name="password">
            <br>
            <button name="signup">
                Register User
            </button>
            {%if message%}
            <h4>{{message}}</h4>
            {%endif%}
            <h4>If you already have an account:</h4>
            <button name="login">Go to Login Page</button>
        </form>
    </body>
</html>
